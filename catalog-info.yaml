apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: quarkusdroneshop-qdca10
  description: "quarkusdroneshop-qdca10 のドリンク製造マイクロサービスです"
  tags:
    - latest
    - b-cluster
  labels:
    app: qdca10
  annotations:
    github.com/project-slug: quarkusdroneshop/quarkusdroneshop-qdca10
    backstage.io/kubernetes-id: quarkusdroneshop-qdca10
    backstage.io/kubernetes-cluster: b-cluster
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=quarkusdroneshop-qdca10
    argocd/app-selector: app.kubernetes.io/instance=quarkusdroneshop-qdca10
    tekton.dev/cicd: "true"
    tekton.dev/type: pipeline
    tektonci.io/pipeline: build-and-push-quarkusdroneshop-qdca10
    tektonci.io/pipelineNamespace: quarkusdroneshop-cicd
    janus-idp.io/tekton: "true"
    rhdh.redhat.com/tekton-enabled: "true"
    backstage.io/techdocs-ref: dir:.
spec:
  type: microservice
  lifecycle: production
  owner: user:default/nmushino
  system: b-cluster
  dependsOn:
    - resource:shop-cluster-kafka-bsite
    - resource:shop-bsite-qdca10-in
    - resource:droneshopdb-bsite-postgresql
  consumesApis:
    - kafka-bsite-qdca10-in
  providesApis:
    - kafka-bsite-orders-up
    - kafka-bsite-eighty-six
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: kafka-bsite-qdca10-in
  description: "Kafka トピック: shop-asite.qdca10-in（QDCA10注文チケット受信）"
  annotations:
    backstage.io/kubernetes-cluster: b-cluster
    openmetadata/explore-url: "http://openmetadata-openmetadata.apps.ocp.27qdr.sandbox1583.opentlc.com/topic/external-shop-cluster-kafka-bsite%3A9094.qdca10-in/schema"
  links:
    - url: "http://openmetadata-openmetadata.apps.ocp.27qdr.sandbox1583.opentlc.com/topic/external-shop-cluster-kafka-bsite%3A9094.qdca10-in/schema"
      title: データカタログ
      icon: dashboard
spec:
  type: asyncapi
  lifecycle: production
  owner: user:default/nmushino
  system: b-cluster
  definition: |
    asyncapi: 2.6.0
    info:
      title: shop-asite.qdca10-in
      version: 1.0.0
      description: QDCA10が注文チケットを受信するトピック
    servers:
      production:
        url: shop-cluster-kafka-bootstrap:9092
        protocol: kafka
    channels:
      shop-asite.qdca10-in:
        description: QDCA10への注文チケットを受信するトピック
        subscribe:
          operationId: receiveQdca10Order
          message:
            name: OrderTicket
            contentType: application/json
            payload:
              type: object
              properties:
                orderId:
                  type: string
                item:
                  type: string
                preparedBy:
                  type: string
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: kafka-bsite-orders-up
  description: "Kafka トピック: orders-up（注文完了通知）"
  annotations:
    backstage.io/kubernetes-cluster: b-cluster
    openmetadata/explore-url: "http://openmetadata-openmetadata.apps.ocp.27qdr.sandbox1583.opentlc.com/topic/external-shop-cluster-kafka-bsite%3A9094.orders-up/schema"
  links:
    - url: "http://openmetadata-openmetadata.apps.ocp.27qdr.sandbox1583.opentlc.com/topic/external-shop-cluster-kafka-bsite%3A9094.orders-up/schema"
      title: データカタログ
      icon: dashboard
spec:
  type: asyncapi
  lifecycle: production
  owner: user:default/nmushino
  system: b-cluster
  definition: |
    asyncapi: 2.6.0
    info:
      title: orders-up
      version: 1.0.0
      description: QDCA10/QDCA10Proからカウンターへの注文完了通知トピック
    servers:
      production:
        url: shop-cluster-kafka-bootstrap:9092
        protocol: kafka
    channels:
      orders-up:
        description: 注文完了をカウンターに通知するトピック
        publish:
          operationId: notifyOrderUp
          message:
            name: OrderUp
            contentType: application/json
            payload:
              type: object
              properties:
                orderId:
                  type: string
                item:
                  type: string
                preparedBy:
                  type: string
                completedAt:
                  type: string
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: kafka-bsite-eighty-six
  description: "Kafka トピック: eighty-six（在庫切れ通知）"
  annotations:
    backstage.io/kubernetes-cluster: b-cluster
    openmetadata/explore-url: "http://openmetadata-openmetadata.apps.ocp.27qdr.sandbox1583.opentlc.com/topic/external-shop-cluster-kafka-bsite%3A9094.eighty-six/schema"
  links:
    - url: "http://openmetadata-openmetadata.apps.ocp.27qdr.sandbox1583.opentlc.com/topic/external-shop-cluster-kafka-bsite%3A9094.eighty-six/schema"
      title: データカタログ
      icon: dashboard
spec:
  type: asyncapi
  lifecycle: production
  owner: user:default/nmushino
  system: b-cluster
  definition: |
    asyncapi: 2.6.0
    info:
      title: eighty-six
      version: 1.0.0
      description: 在庫切れ（86）通知トピック
    servers:
      production:
        url: shop-cluster-kafka-bootstrap:9092
        protocol: kafka
    channels:
      eighty-six:
        description: 在庫切れ商品を通知するトピック
        publish:
          operationId: notifyEightySix
          message:
            name: EightySixEvent
            contentType: application/json
            payload:
              type: object
              properties:
                item:
                  type: string
                reason:
                  type: string

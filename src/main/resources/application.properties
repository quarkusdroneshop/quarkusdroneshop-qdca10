# Ports
#quarkus.http.port=8082

# Logging
#quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.format=%-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=DEBUG
quarkus.log.category."io.quarkusdroneshop".level=DEBUG
quarkus.log.category."org.apache.kafka".level=FATAL
quarkus.log.category."org.testcontainers".level=FATAL

#Kafka
# Configure the SmallRye Kafka connector
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS}
%dev.kafka.bootstrap.servers=localhost:9092
%test.kafka.bootstrap.servers=localhost:9092

## Orders topic

## DataMeshの場合、Topicにサイト名を追加
### Incoming
## マイクロサービスをまたぐ連携は dataproduct 経由に統一する方針のため、
## counter の直接トピック (qdca10-in) ではなく、order-events Flink ジョブが
## 発行する dataproduct-order-events (Avro) から QDCA10 宛ての ORDER_PLACED
## 明細のみを購読する (OrderEventOrderInDeserializer 側で assemblyLine='QDCA10'
## でフィルタする)。order-events は asite でのみ稼働しているため、bsite からは
## MirrorMaker2 でミラーされたトピック名 (shop-asite.dataproduct-order-events)
## を参照し、Avro スキーマも実際にシリアライズした asite の Registry を使う。
mp.messaging.incoming.orders-in.connector=smallrye-kafka
mp.messaging.incoming.orders-in.value.deserializer=io.quarkusdroneshop.qdca10.infrastructure.OrderEventOrderInDeserializer
%prod.mp.messaging.incoming.orders-in.topic=shop-asite.dataproduct-order-events
%dev.mp.messaging.incoming.orders-in.topic=qdca10-in
mp.messaging.incoming.orders-in.group.id=qdca10-group
%prod.mp.messaging.incoming.orders-in.apicurio.registry.url=http://droneshop-apicurioregistry-kafkasql.quarkusdroneshop-demo.router-default.apps.ocp.zgjl6.sandbox780.opentlc.com/apis/registry/v2

### Outgoing
mp.messaging.outgoing.orders-up.connector=smallrye-kafka
mp.messaging.outgoing.orders-up.value.serializer=io.quarkusdroneshop.qdca10.infrastructure.CustomObjectMapperSerializer
mp.messaging.outgoing.orders-up.topic=orders-up

mp.messaging.outgoing.eighty-six.connector=smallrye-kafka
mp.messaging.outgoing.eighty-six.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.eighty-six.topic=eighty-six

## 注文消費による在庫減算後の絶対数量を drone-component-stock データプロダクトへ
## 伝える (component-stock-job.sql が component_stock_quantity へそのまま反映する)。
## 補充時と同様に item ごとの絶対数を publish する (JSON, 他の outgoing と同じ方式)。
mp.messaging.outgoing.component-stock-decrement.connector=smallrye-kafka
mp.messaging.outgoing.component-stock-decrement.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.component-stock-decrement.topic=dataproduct-component-stock-decrement

## Component stock (在庫) の取得元
## 在庫判定はランダムなインメモリ生成をやめ、drone-component-stock データプロダクトが
## 公開する dataproduct-component-stock-quantity (item 単位の実在庫数、inventory ドメイン
## 由来) を購読してローカルキャッシュ (Inventory) を更新する。inventory / drone-component-stock
## は QDCA10 と同じサイトで稼働する想定のため、orders-in と異なりサイト prefix は付けない
## (将来別サイトに切り離す場合は shop-<site>. prefix が必要になる)。
mp.messaging.incoming.component-stock-quantity.connector=smallrye-kafka
mp.messaging.incoming.component-stock-quantity.topic=dataproduct-component-stock-quantity
mp.messaging.incoming.component-stock-quantity.value.deserializer=io.quarkusdroneshop.qdca10.infrastructure.ComponentStockQuantityDeserializer
# group.id を Pod ごとに一意にする (HOSTNAME を付与)。dataproduct-component-stock-quantity は
# compacted topic であり、QDCA10 は在庫キャッシュ (Inventory.rawBaseline/stock) をオンメモリでしか
# 保持していないため、固定 group.id だと Pod 再起動のたびにコミット済みオフセットから再開してしまい
# (auto.offset.reset=earliest が効かない)、既存の在庫スナップショットを再取得できないまま
# 全品目が eighty-six (欠品扱い) になる不具合があった。Pod 起動ごとに新しい group.id を使うことで、
# 毎回 earliest から全件バックフィルさせる。
mp.messaging.incoming.component-stock-quantity.group.id=qdca10-component-stock-group-${HOSTNAME:local}
mp.messaging.incoming.component-stock-quantity.auto.offset.reset=earliest
%prod.mp.messaging.incoming.component-stock-quantity.apicurio.registry.url=${APICURIO_REGISTRY_URL}/apis/registry/v2

# Test profile: use in-memory connector instead of Kafka
%test.mp.messaging.incoming.orders-in.connector=smallrye-in-memory
%test.mp.messaging.outgoing.orders-up.connector=smallrye-in-memory
%test.mp.messaging.outgoing.eighty-six.connector=smallrye-in-memory
%test.mp.messaging.incoming.component-stock-quantity.connector=smallrye-in-memory
%test.mp.messaging.outgoing.component-stock-decrement.connector=smallrye-in-memory

# Jandex index for in-memory connector
quarkus.index-dependency.smallrye-in-memory.group-id=io.smallrye.reactive
quarkus.index-dependency.smallrye-in-memory.artifact-id=smallrye-reactive-messaging-in-memory

# Health Check
quarkus.smallrye-health.ui.always-include=true
quarkus.kafka.health.enabled=true
